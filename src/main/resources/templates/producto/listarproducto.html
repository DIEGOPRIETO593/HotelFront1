<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{plantilla/plantillaui}">
<head>
<meta charset="UTF-8">
<title>Productos</title>
</head>
<body>

	<div layout:fragment="contenidopaginas">
		<div class="container-fluid py-2">

			<div th:if="${message != null}"
				th:classappend="${message.type == 'success' ? 'alert-success' : 'alert-danger'}"
				class="alert shadow-sm alert-dismissible fade show d-flex align-items-center"
				role="alert">
				<div th:text="${message.text}">Texto del mensaje</div>
				<button type="button" class="btn-close" data-bs-dismiss="alert"
					aria-label="Close"></button>
			</div>

			<div class="d-flex justify-content-between align-items-center mb-4">
				<div>
					<h2 class="h3 fw-bold mb-0 text-primary">Gestión de Productos</h2>
					<p class="text-secondary small mb-0">Administra los productos del hotel.</p>
				</div>
				<div class="d-flex gap-2">
					<a th:href="@{/producto}"
						class="btn btn-outline-secondary shadow-sm d-flex align-items-center">
						<i class="fas fa-sync-alt me-1"></i> Refrescar
					</a>

					<button type="button"
						class="btn btn-primary shadow-sm d-flex align-items-center"
						data-toggle="modal" data-target="#productoModal"
						data-bs-toggle="modal" data-bs-target="#productoModal">
						<i class="fas fa-plus me-1"></i> Nuevo Producto
					</button>
				</div>
			</div>

			<div class="card shadow-sm border-0 rounded-4">
				<div class="card-body p-0">
					<div class="table-responsive">
						<table class="table table-hover align-middle mb-0">
							<thead class="table-light">
								<tr>
									<th class="ps-4 text-secondary fw-semibold border-bottom-0 py-3 rounded-top-start" style="width: 80px;">ID</th>
									<th class="text-secondary fw-semibold border-bottom-0 py-3">Nombre</th>
									<th class="text-secondary fw-semibold border-bottom-0 py-3">Precio</th>
									<th class="text-secondary fw-semibold border-bottom-0 py-3">Stock</th>
									<th class="text-end pe-4 text-secondary fw-semibold border-bottom-0 py-3 rounded-top-end">Acciones</th>
								</tr>
							</thead>
							<tbody class="border-top-0">
								<tr th:each="p : ${productos}">
									<td class="ps-4"><span class="badge bg-secondary rounded-pill shadow-sm" th:text="${p.idProducto}">#1</span></td>
									<td class="fw-medium" th:text="${p.nombre}">Coca Cola</td>
									<td th:text="${'$' + p.precio}">$2.50</td>
									<td th:text="${p.stock}">50</td>
									<td class="text-end pe-4">
										<a th:href="@{/producto/editar/{id}(id=${p.idProducto})}" class="btn btn-sm btn-outline-primary me-2 shadow-sm" title="Editar">
											<i class="fas fa-pencil-alt"></i> Editar
										</a>
										<a th:href="@{/producto/eliminar/{id}(id=${p.idProducto})}" class="btn btn-sm btn-outline-danger shadow-sm" title="Eliminar" onclick="return confirm('¿Estás seguro de que deseas eliminar este producto?');">
											<i class="fas fa-trash"></i> Eliminar
										</a>
									</td>
								</tr>
								<tr th:if="${#lists.isEmpty(productos)}">
									<td colspan="5" class="text-center py-5 text-secondary">
										<p class="fs-5 fw-medium mb-1">No hay productos registrados</p>
									</td>
								</tr>
							</tbody>
						</table>
					</div>
				</div>
			</div>

			<div class="modal fade" id="productoModal" tabindex="-1" role="dialog"
				aria-labelledby="productoModalLabel" aria-hidden="true"
				th:classappend="${showModal != null and showModal} ? 'show d-block' : ''">
				<div class="modal-dialog modal-dialog-centered">
					<div class="modal-content border-0 shadow-lg rounded-4">

						<div class="modal-header border-bottom-0 pb-0 pt-4 px-4">
							<h5 class="modal-title fw-bold text-primary" id="productoModalLabel">
								<span th:if="${producto.idProducto == 0}">Registrar Nuevo Producto</span>
								<span th:unless="${producto.idProducto == 0}">Editar Producto</span>
							</h5>
							<button type="button" class="btn-close" data-bs-dismiss="modal"
								aria-label="Close"
								th:onclick="|window.location.href='/producto'|"></button>
						</div>

						<form th:action="@{/producto/guardar}" th:object="${producto}" method="post">

							<input type="hidden" th:field="*{idProducto}" />

							<div class="modal-body px-4 pt-4">
								<div class="row">
									<div class="col-12 form-group mb-3">
										<label class="form-label fw-semibold">Nombre</label>
										<input type="text" name="nombre" th:value="*{nombre}" class="form-control" required />
									</div>
								</div>
								<div class="row">
									<div class="col-12 col-md-6 form-group mb-3">
										<label class="form-label fw-semibold">Precio</label>
										<input type="number" step="0.01" name="precio" th:value="*{precio}" class="form-control" required />
									</div>
									<div class="col-12 col-md-6 form-group mb-3">
										<label class="form-label fw-semibold">Stock</label>
										<input type="number" name="stock" th:value="*{stock}" class="form-control" required min="0" />
									</div>
								</div>
							</div>

							<div class="modal-footer border-top-0 px-4 pb-4 pt-3">
								<a th:href="@{/producto}" class="btn btn-secondary">Cancelar</a>
								<button type="submit" class="btn btn-primary px-4">Guardar</button>
							</div>
						</form>

					</div>
				</div>
				<script th:inline="javascript">
					document.addEventListener("DOMContentLoaded", function() {
						/*[# th:if="${showModal}"]*/
						if (typeof bootstrap !== 'undefined') {
							var modal = new bootstrap.Modal(document.getElementById('productoModal'));
							modal.show();
						} else if (typeof $ !== 'undefined') {
							$('#productoModal').modal('show');
						}
						/*[/]*/
					});
				</script>
				<style>
					.modal.show.d-block { z-index: 1055 !important; background-color: rgba(0, 0, 0, 0.5) !important; }
					.modal-backdrop { display: none !important; }
				</style>
			</div>

		</div>
	</div>
</body>
</html>
